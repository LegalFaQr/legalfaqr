name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: legalfaqr
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=7c3aed&color_dots=#ebedf0,#bae6fd,#38bdf8,#0369a1,#7c3aed
            dist/github-contribution-grid-snake-dark.svg?color_snake=00F7FF&color_dots=#21262d,#3b1f6b,#6d28d9,#a78bfa,#00F7FF
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
