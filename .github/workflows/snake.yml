name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: legalfaqr
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00F7FF&color_dots=#0D1117,#007CF0,#00C4FF,#00F7FF,#8B5CF6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00F7FF

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
