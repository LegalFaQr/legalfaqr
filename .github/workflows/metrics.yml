name: Generate GitHub Metrics

# ─────────────────────────────────────────────────────────────────────────────────
# REQUIRED: A Personal Access Token (classic) named GH_PAT
#
#   1. Go to  https://github.com/settings/tokens/new
#   2. Select scopes:  repo · read:user · read:org · read:packages
#   3. Copy the token and save it as a repository secret called  GH_PAT
#      → Repo → Settings → Secrets and variables → Actions → New repository secret
#
#   This token lets the workflow see PRIVATE repos — commits, languages,
#   traffic, and contribution data will all include private work.
# ─────────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 0 * * *"          # runs daily at midnight UTC
  workflow_dispatch:              # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'legalfaqr'
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_PAT }}
          user: legalfaqr
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_forks: yes
          commits_authoring: legalfaqr, legalfaqr@gmail.com, legalfaqr@users.noreply.github.com
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes
          config_order: >-
            base.header,
            isocalendar,
            habits,
            languages,
            notable,
            achievements,
            followup,
            lines,
            traffic

          # ── Isometric calendar (full year — private repos included) ─────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Coding Habits: commit-hour heatmap & day-of-week chart ──────
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 30
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # ── Languages (deep analysis — clones repos, counts real lines) ─
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%

          # ── Notable Contributions to high-star / well-known repos ───────
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_repositories: yes
          plugin_notable_indepth: no

          # ── Achievements ────────────────────────────────────────────────
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B

          # ── Follow-up: open/closed ratio for issues & PRs ──────────────
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes

          # ── Lines of Code added / removed ──────────────────────────────
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_repositories_limit: 6

          # ── Repo traffic (views & clones — requires repo scope) ────────
          plugin_traffic: yes

          # ── Output ─────────────────────────────────────────────────────
          output_action: commit
          filename: github-metrics.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "chore: update github metrics [skip ci]"
