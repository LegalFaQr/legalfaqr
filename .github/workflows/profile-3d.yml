name: Generate 3D Contribution Graph (disabled)

on:
  # schedule:
  #   - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          # Use GH_PAT (Personal Access Token with `repo` + `read:user` scopes)
          # stored as a repository secret to include PRIVATE repo contributions.
          # Fall back to the default GITHUB_TOKEN if GH_PAT is not set.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          USERNAME: legalfaqr
          # Include contributions from ALL repos (public + private)
          INCLUDE_ALL_CONTRIBUTIONS: true
          # Use the rainbow night view for a premium look
          SETTING_JSON: |-
            {
              "githubUserName": "legalfaqr",
              "type": "nightRainbow",
              "angle": 20,
              "width": 1600,
              "height": 600
            }

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update 3D contribution graph [skip ci]" || echo "No changes to commit"
          git push
